<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QxBlog - 学习</title>
    <link rel="stylesheet" href="../../css/font-awesome.min.css">
    <link rel="stylesheet" href="../../css/default.css">
    <script type="module" src="../../js/default.js"></script>
    <script>
        (function () {
            var t = localStorage.getItem('qx-theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>

<body>
    <section class="qx-page-hero">
        <span class="qx-page-hero-tag">&lt;Category /&gt;</span>
        <h1 class="qx-page-hero-title">学习</h1>
        <p class="qx-page-hero-sub">共 3 篇文章</p>
    </section>

    <section class="qx-articles">
        <div class="qx-articles-grid"></div>
        <div class="qx-pagination" id="qxPagination" data-source="category" data-label="学习"></div>
    </section>

</body>

</html>
