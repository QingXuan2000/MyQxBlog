<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>QxBlog - 首页</title>
    <link rel="stylesheet" href="./css/default.css">
    <style>
        .qx-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body);
            transition: opacity .3s, visibility .3s
        }

        .qx-loader.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none
        }
    </style>
    <script type="module" src="./js/default.js"></script>
    <script>
        (function () {
            var t = localStorage.getItem('qx-theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>

<body>
    <div class="qx-loader">
        <svg class="qx-loader-geo" viewBox="0 0 620 620" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g class="qx-loader-orbit-wrap">
                <ellipse class="qx-loader-orbit" cx="310" cy="310" rx="230" ry="85" stroke-width="2.5" opacity="0.22"
                    transform="rotate(-18, 310, 310)" />
            </g>
            <g class="qx-loader-orbit-wrap">
                <ellipse class="qx-loader-orbit" cx="310" cy="310" rx="170" ry="120" stroke-width="2.2" opacity="0.16"
                    transform="rotate(28, 310, 310)" />
            </g>
            <line class="qx-loader-radial" x1="310" y1="310" x2="570" y2="310" />
            <line class="qx-loader-radial" x1="310" y1="310" x2="440" y2="535" />
            <line class="qx-loader-radial" x1="310" y1="310" x2="180" y2="535" />
            <line class="qx-loader-radial" x1="310" y1="310" x2="50" y2="310" />
            <line class="qx-loader-radial" x1="310" y1="310" x2="180" y2="85" />
            <line class="qx-loader-radial" x1="310" y1="310" x2="440" y2="85" />
            <polygon class="qx-loader-outer" points="570,310 440,535 180,535 50,310 180,85 440,85" />
            <polygon class="qx-loader-inner" points="440,385 310,460 180,385 180,235 310,160 440,235" />
            <circle class="qx-loader-dot" cx="570" cy="310" r="5.5" style="animation-delay:0s" />
            <circle class="qx-loader-dot" cx="440" cy="535" r="5.5" style="animation-delay:.5s" />
            <circle class="qx-loader-dot" cx="180" cy="535" r="5.5" style="animation-delay:1s" />
            <circle class="qx-loader-dot" cx="50" cy="310" r="5.5" style="animation-delay:1.5s" />
            <circle class="qx-loader-dot" cx="180" cy="85" r="5.5" style="animation-delay:2s" />
            <circle class="qx-loader-dot" cx="440" cy="85" r="5.5" style="animation-delay:2.5s" />
            <circle class="qx-loader-idot" cx="440" cy="385" r="3.2" />
            <circle class="qx-loader-idot" cx="310" cy="460" r="3.2" />
            <circle class="qx-loader-idot" cx="180" cy="385" r="3.2" />
            <circle class="qx-loader-idot" cx="180" cy="235" r="3.2" />
            <circle class="qx-loader-idot" cx="310" cy="160" r="3.2" />
            <circle class="qx-loader-idot" cx="440" cy="235" r="3.2" />
            <circle class="qx-loader-core" cx="310" cy="310" r="8" />
        </svg>
    </div>
    <section class="qx-site-intro">
        <div class="qx-site-intro-grid">
            <div class="qx-site-intro-main">
                <header class="qx-site-intro-header">
                    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <pattern id="verticalLines" width="40" height="100" patternUnits="userSpaceOnUse">
                                <line x1="0" y1="0" x2="0" y2="100" stroke="currentColor" stroke-width="1" />
                            </pattern>
                        </defs>
                        
                        <rect width="100%" height="100%" fill="url(#verticalLines)" />
                    </svg>
                </header>

                <section class="qx-site-intro-section">
                    <h1 class="qx-site-intro-meta-val" id="hero-name">QxBlog</h1>
                    <p class="qx-site-intro-title" id="hero-title">占位符</p>
                </section>

                <section class="qx-site-intro-section-bottom-left">
                    <span class="qx-page-hero-tag">&lt;blogDatabase/&gt;</span>
                    <div class="qx-site-intro-meta">
                        <div class="qx-site-intro-meta-item">
                            <span class="qx-site-intro-meta-key">blog</span>
                            <span class="qx-site-intro-meta-op">=</span>
                            <span class="qx-site-intro-meta-val" id="blog-name">-</span>
                        </div>
                        <div class="qx-site-intro-meta-item">
                            <span class="qx-site-intro-meta-key">author</span>
                            <span class="qx-site-intro-meta-op">=</span>
                            <span class="qx-site-intro-meta-val" id="blog-author">-</span>
                        </div>
                        <div class="qx-site-intro-meta-item">
                            <span class="qx-site-intro-meta-key">posts</span>
                            <span class="qx-site-intro-meta-op">=</span>
                            <span class="qx-site-intro-meta-val" id="hero-posts">-</span>
                        </div>
                        <div class="qx-site-intro-meta-item">
                            <span class="qx-site-intro-meta-key">tags</span>
                            <span class="qx-site-intro-meta-op">=</span>
                            <span class="qx-site-intro-meta-val" id="hero-tags">-</span>
                        </div>
                        <div class="qx-site-intro-meta-item">
                            <span class="qx-site-intro-meta-key">categories</span>
                            <span class="qx-site-intro-meta-op">=</span>
                            <span class="qx-site-intro-meta-val" id="hero-categories">-</span>
                        </div>
                    </div>
                </section>

                <section class="qx-site-intro-section-bottom-center">
                    
                </section>

                <section class="qx-site-intro-section-bottom-right">
                    
                </section>
            </div>
        </div>


    </section>

    <section class="qx-articles">
        <div class="qx-articles-head">文章</div>
        <div class="qx-articles-grid"></div>
        <div class="qx-pagination" id="qxPagination"></div>
    </section>

</body>

</html>
